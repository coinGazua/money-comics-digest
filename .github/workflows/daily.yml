name: Money Comics Digest

on:
  schedule:
    # 아침 라이브(BuyKings) 종료 후: 08:30~11:00 KST = 23:30~02:00 UTC
    - cron: '*/30 23 * * 0-4'
    - cron: '*/30 0,1,2 * * 1-5'
    # 저녁 라이브 종료 후: 21:00~01:00 KST = 12:00~16:00 UTC
    - cron: '*/30 12,13,14,15,16 * * 1-5'

  workflow_dispatch:
    inputs:
      manual_url:
        description: '수동 처리할 YouTube URL (비워두면 자동 스캔)'
        required: false
        default: ''

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client youtube-transcript-api anthropic

      - name: Run digest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MANUAL_URL: ${{ github.event.inputs.manual_url }}
        run: python main.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ -f
          git diff --staged --quiet || git commit -m "digest: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push
